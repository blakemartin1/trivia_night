<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HHC Trivia - Lock In Answer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: white; padding: 20px; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #1e293b; padding: 30px; border-radius: 14px; box-shadow: 0 12px 30px rgba(0,0,0,0.4); max-width: 450px; width: 100%; box-sizing: border-box; border: 1px solid #334155; }
        
        /* HHC Sky Blue Typography Accent Header */
        h2 { margin-top: 0; color: #38bdf8; font-size: 1.8rem; text-align: center; margin-bottom: 25px; font-weight: 700; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-weight: 600; font-size: 0.95rem; }
        input, select { width: 100%; padding: 13px; border-radius: 8px; border: 2px solid #334155; background: #0f172a; color: white; font-size: 1rem; box-sizing: border-box; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: #38bdf8; outline: none; }
        
        /* HHC Forest Green Submission Engine Trigger Accent */
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; background: #14532d; color: white; font-size: 1.15rem; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        button:hover { background: #166534; }
        button:disabled { background: #475569; cursor: not-allowed; opacity: 0.6; }
        
        .success-banner { background: #10b981; color: white; padding: 12px; border-radius: 6px; text-align: center; font-weight: bold; margin-top: 15px; display: none; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="card">
    <div style="text-align: center; margin-bottom: 12px;">
        <img src="hampstead-logo.png" alt="HHC Logo" style="width: 85px; height: auto; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));">
    </div>
    <h2>HHC Trivia Engine</h2>
    
    <div class="form-group">
        <label for="teamName">Team Name</label>
        <input type="text" id="teamName" placeholder="e.g., The Couch Potatoes" maxlength="30">
    </div>

    <div class="form-group">
        <label for="questionNum">Question Number</label>
        <select id="questionNum">
            <script>
                for (let i = 1; i <= 50; i++) {
                    document.write(`<option value="${i}">Question ${i}</option>`);
                }
            </script>
        </select>
    </div>

    <div class="form-group">
        <label for="playerAnswer">Your Answer</label>
        <input type="text" id="playerAnswer" placeholder="Type your answer here..." autocomplete="off">
    </div>

    <button id="submit-btn" onclick="submitAnswer()">Lock It In!</button>
    <div id="success" class="success-banner">🚀 Answer sent to host panel!</div>
</div>

<script>
    const SUPABASE_URL = "https://qbevpwghcjtdeqlmkimh.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiZXZwd2doY2p0ZGVxbG1raW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTMxMDksImV4cCI6MjA5NzM2OTEwOX0.U9SncOyUdFQIvPGvcYXifIaiFzsSoHRNB_TrvD8oJWM";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        const savedTeam = localStorage.getItem('trivia_team_name');
        if (savedTeam) {
            document.getElementById('teamName').value = savedTeam;
        }
    };

    async function submitAnswer() {
        const submitBtn = document.getElementById('submit-btn');
        const teamInput = document.getElementById('teamName');
        const answerInput = document.getElementById('playerAnswer');
        const questionSelect = document.getElementById('questionNum');

        const team = teamInput.value.trim();
        const ans = answerInput.value.trim();
        const qNum = parseInt(questionSelect.value);

        if (!team || !ans) {
            alert("Hold on! Make sure both Team Name and Answer are filled out.");
            return;
        }

        localStorage.setItem('trivia_team_name', team);

        submitBtn.disabled = true;
        submitBtn.innerText = "Sending...";

        const roundNum = Math.ceil(qNum / 10);

        const { error } = await supabaseClient
            .from('submissions')
            .insert([{ 
                team_name: team, 
                answer_submitted: ans, 
                round_number: roundNum, 
                question_number: qNum 
            }]);

        if (!error) {
            answerInput.value = '';
            
            if (qNum < 50) {
                questionSelect.value = qNum + 1;
            }

            const banner = document.getElementById('success');
            banner.style.display = 'block';
            
            setTimeout(() => {
                banner.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.innerText = "Lock It In!";
            }, 2500);

        } else {
            alert("Error communicating with host database. Please let the host know or retry.");
            console.error(error);
            submitBtn.disabled = false;
            submitBtn.innerText = "Lock It In!";
        }
    }
</script>
</body>
</html>
